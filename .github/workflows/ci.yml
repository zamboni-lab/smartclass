name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libfreetype6-dev libjpeg-turbo8-dev liblapack-dev libopenblas-dev libpng-dev libtiff-dev
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Run tests for PR
        run: |
          uv sync --group dev
          uv run pytest --cov-config=.coveragerc --cov=.
          uv run coverage xml
      - uses: orgoro/coverage@ca0c362dc1a4f100447309405e6dfea47e251495
        if: github.event_name == 'pull_request'
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.98
