name: CI Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-docs:
    name: "Build Docs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0 # Full history for accurate page timestamps
          persist-credentials: false

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install package and dependencies
        run: |
          uv sync
          uv pip install great-docs

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b

      - name: Build docs
        run: |
          uv sync --group docs
          uv run great-docs build

      - name: Save docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-html
          path: great-docs/_site

  publish-docs:
    name: "Publish Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: docs-html
          path: great-docs/_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: great-docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

  preview-docs:
    name: "Preview Docs"
    runs-on: ubuntu-latest
    needs: "build-docs"
    if: github.event_name == 'pull_request'
    permissions:
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: docs-html
          path: great-docs/_site

      # Start deployment
      - name: Configure pull release name
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "RELEASE_NAME=pr-${{ github.event.number }}" >> $GITHUB_ENV

      - name: Configure branch release name
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          # use branch name, but replace slashes. E.g. feat/a -> feat-a
          echo "RELEASE_NAME=${GITHUB_REF_NAME//\//-}" >> $GITHUB_ENV

      # Deploy
      - name: Create Github Deployment
        uses: bobheadxi/deployments@648679e8e4915b27893bd7dbc35cb504dc915bc8
        id: deployment
        if: ${{ !github.event.pull_request.head.repo.fork }}
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: ${{ env.RELEASE_NAME }}
          ref: ${{ github.head_ref }}
          logs: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
